<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f0c0d4, #c9d6ff);
    overflow: hidden;
}

/* 🎮 окно */
.container {
    text-align: center;
    background: rgba(255,255,255,0.25);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
}

/* текст */
#message {
    color: rgb(176, 48, 72);
    font-size: 40px;
    margin-bottom: 20px;
}

/* картинка */
img {
    width: 400px;
    border-radius: 20px;
    margin-bottom: 20px;
    transition: transform 0.5s ease;
}

/* кнопки */
.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    padding: 25px 50px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
}

#yes-button {
    background: #2ecc71;
    color: white;
    animation: pulse 2s infinite;
}

#no-button {
    background: #800000;
    color: white;
}

/* hidden */
.hidden {
    display: none;
}

/* pulse */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* ❤️ */
.heart {
    position: fixed;
    top: -10px;
    color: red;
    font-size: 20px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}

/* 💖 fade */
.fade-in {
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

/* 💌 приглашение */
.invite-card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease forwards;
}

.invite-card h2 {
    color: rgb(176, 48, 72);
}

.invite-card ul {
    list-style: none;
    padding: 0;
}

.invite-card li {
    margin: 8px 0;
    font-size: 18px;
}

.invite-card button {
    margin-top: 10px;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #2ecc71;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

    <h1 id="message">Пошли гулять 😊?</h1>

    <img src="please.gif" id="kittenImg">

    <div class="buttons">
        <button id="no-button">Нет😭</button>
        <button id="yes-button" onclick="startGame()">Да💚</button>
    </div>

    <!-- 💌 приглашение -->
    <div id="invite" class="hidden invite-card">
        <h2>💌 Приглашение</h2>

        <ul>
            <li>📍 Жду в кофейне #5 в 17:00</li>
            <li>😊 Опоздания не осуждаются :)</li>
            <li>👕 Форма одежды — комфортная для тебя</li>
            <li>💖 Обязательно захватить милую улыбку</li>
        </ul>

        <button onclick="finalStep()">Я буду 💚</button>
    </div>

</div>

<script>

let i = 0;

/* убегающая кнопка */
document.getElementById('no-button').addEventListener('mouseover', function() {
    let x = Math.random() * 500 - 150;
    let y = Math.random() * 400 - 150;

    this.style.transform = `translate(${x}px, ${y}px)`;

    if (i < 3) this.textContent = "не поймаешь 😛";
    if (i > 3 && i < 5) this.textContent = "лови меня 😂";
    if (i > 5) this.hidden = true;

    i++;
});

/* старт */
function startGame() {
    showScene();
    startHearts();
    playSound();
}

/* сцена */
function showScene() {
    let buttons = document.querySelectorAll("button");
    let img = document.getElementById("kittenImg");
    let message = document.getElementById("message");

    buttons.forEach(b => b.classList.add("hidden"));

    message.textContent = "УРЯЯЯЯЯЯЯЯЯ 💖";

    img.src = "happy2.gif";
    img.style.width = "500px";
    img.style.transform = "rotate(360deg)";
    img.style.borderRadius = "30px";

    /* 💌 показать приглашение */
    setTimeout(() => {
        document.getElementById("invite").classList.remove("hidden");
    }, 1500);
}

/* финал */
function finalStep() {
    alert("💖 До встречи в кофейне :)");
}

/* ❤️ сердечки */
function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerText = "❤️";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = (2 + Math.random() * 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 200);
}

/* 🔊 звук */
function playSound() {
    let audio = new Audio("https://www.myinstants.com/media/sounds/pling.mp3");
    audio.volume = 0.4;
    audio.play();
}

</script>

</body>
</html>
